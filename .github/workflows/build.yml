name: Build GDExtension

on:
  push:
    branches: ["*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            arch: x86_64
          - platform: linux
            os: ubuntu-latest
            arch: x86_64
          - platform: macos
            os: macos-latest
            arch: universal

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCons
        run: pip install scons

      - name: Build debug
        run: scons platform=${{ matrix.platform }} target=template_debug arch=${{ matrix.arch }} -j4

      - name: Build release
        run: scons platform=${{ matrix.platform }} target=template_release arch=${{ matrix.arch }} -j4

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shangcloud-mmo-${{ matrix.platform }}-${{ matrix.arch }}
          path: bin/
          if-no-files-found: error
